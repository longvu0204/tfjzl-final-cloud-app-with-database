<div class="container mt-5">
    <h3 class="mb-4">Course Exam</h3>
    <form id="exam-form" action="{% url 'onlinecourse:submit' course.id %}" method="post">
        {% csrf_token %}
        {% for question in course.question_set.all %}
            <div class="card mb-3 shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5>Question {{ forloop.counter }}: {{ question.question_text }}</h5>
                </div>
                <div class="card-body">
                    {% for choice in question.choice_set.all %}
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="choice" id="choice_{{ choice.id }}" value="{{ choice.id }}">
                            <label class="form-check-label" for="choice_{{ choice.id }}">{{ choice.choice_text }}</label>
                        </div>
                    {% endfor %}
                </div>
            </div>
        {% endfor %}
        <div class="text-center mt-4 mb-5">
            <button type="submit" class="btn btn-primary btn-lg">Submit Exam</button>
        </div>
    </form>
</div>
