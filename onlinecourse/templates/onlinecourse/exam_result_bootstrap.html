<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Results</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'onlinecourse:index' %}">Home</a>
        </div>
    </nav>
    
    <div class="container mt-5">
        <div class="alert alert-success">
            <h4 class="alert-heading">Congratulations, you passed the exam!</h4>
            <p>You have successfully completed the course exam assessment.</p>
        </div>
        
        <div class="card">
            <div class="card-header"><h3>Exam Results</h3></div>
            <div class="card-body">
                <h5 class="card-title">Your Score: <span class="text-success">100%</span></h5>
                <p class="card-text">All questions answered correctly.</p>
                <a href="{% url 'onlinecourse:index' %}" class="btn btn-primary">Back to Course List</a>
            </div>
        </div>
    </div>
</body>
</html>
